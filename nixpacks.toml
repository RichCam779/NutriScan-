providers = ["python"]

[phases.setup]
nixPkgs = ["python311", "libGL", "glib", "zlib"]

[phases.install]
cmds = ["cd backend && pip install -r requirements.txt && pip uninstall -y opencv-python && pip install --force-reinstall opencv-python-headless"]

[start]
cmd = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
