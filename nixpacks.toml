providers = ["python"]

[phases.setup]
nixPkgs = ["python311", "libGL", "glib", "xorg.libxcb", "xorg.libX11", "xorg.libXext", "xorg.libXrender"]
aptPkgs = ["libgl1-mesa-glx", "libglib2.0-0", "libxcb1", "libx11-xcb1", "libsm6", "libxext6"]

[phases.install]
cmds = ["cd backend && pip install -r requirements.txt"]

[start]
cmd = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
