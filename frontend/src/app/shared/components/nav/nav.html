<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid px-lg-5">
    <a class="navbar-brand fw-bolder text-success d-flex align-items-center" routerLink="/" style="font-size: 2rem;">
        <!-- Logo de NutriScan -->
      <img src="assets/NutriScan.png" alt="Logo" width="55" height="55"
           class="me-3 rounded-circle shadow"
           onerror="this.style.display='none'">
      NutriScan
    </a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto fw-semibold align-items-center">
        <li class="nav-item me-2">
          <a class="nav-link text-white fw-bold bg-secondary bg-opacity-25 rounded-pill px-3 py-2 transition-all"
             routerLink="/acerca">
            <i class="bi bi-info-circle me-1"></i> Acerca de
          </a>
        </li>
        <li class="nav-item me-2">
          <a class="nav-link text-white fw-bold bg-secondary bg-opacity-25 rounded-pill px-3 py-2 transition-all"
             routerLink="/contacto">
            <i class="bi bi-envelope me-1"></i> Contacto
          </a>
        </li>

        <!-- Usuario autenticado -->
        <ng-container *ngIf="currentUser">
          <li class="nav-item dropdown ms-lg-3">
            <a class="nav-link dropdown-toggle d-flex align-items-center bg-success rounded-pill px-3 py-2 text-white shadow-sm"
               href="#" id="userDropdown" role="button"
               data-bs-toggle="dropdown" aria-expanded="false">
              <i class="bi bi-person-circle me-2"></i>
              <span class="d-inline-block text-truncate" style="max-width: 120px;">{{ currentUser.nombre }}</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-3 mt-2" aria-labelledby="userDropdown">
              <li>
                <a class="dropdown-item py-2"
                   [routerLink]="currentUser.id_rol === 1 ? '/admin' : currentUser.id_rol === 2 ? '/nutricionista' : '/usuario'">
                  <i class="bi bi-speedometer2 me-2"></i>Mi Panel
                </a>
              </li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <button class="dropdown-item py-2 text-danger" (click)="logout()">
                  <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
                </button>
              </li>
            </ul>
          </li>
        </ng-container>

        <!-- Sin sesión -->
        <ng-container *ngIf="!currentUser">
          <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
            <a class="btn btn-outline-success rounded-pill px-4 fw-bold shadow-sm transition-all"
               routerLink="/login">
              <i class="bi bi-person-circle me-2"></i>Iniciar sesión
            </a>
          </li>
        </ng-container>
      </ul>
    </div>
  </div>
</nav>
